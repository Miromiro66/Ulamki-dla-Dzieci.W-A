    // --- ANIMOWANE TŁO 3D (Hiperprzestrzeń) ---
    const Starfield = ({ speed, isWarp }) => {
      const canvasRef = useRef(null);

      useEffect(() => {
        const canvas = canvasRef.current;
        const ctx = canvas.getContext('2d');
        let animationFrameId;
        
        let width = window.innerWidth;
        let height = window.innerHeight;
        canvas.width = width;
        canvas.height = height;

        const numStars = 800; // Ilość gwiazd
        const stars = Array.from({ length: numStars }, () => ({
          x: (Math.random() - 0.5) * 3000,
          y: (Math.random() - 0.5) * 3000,
          z: Math.random() * 2000 + 1
        }));

        const fov = 800;

        const render = () => {
          ctx.clearRect(0, 0, width, height);
          const cx = width / 2;
          const cy = height / 2;

          for (let i = 0; i < numStars; i++) {
            const star = stars[i];
            const oldZ = star.z;
            star.z -= speed;

            // Gdy gwiazda przeleci za naszą kamerę - respawn z przodu
            if (star.z <= 0) {
              star.z += 2000;
              star.x = (Math.random() - 0.5) * 3000;
              star.y = (Math.random() - 0.5) * 3000;
              continue; 
            }

            const sx = (star.x / star.z) * fov + cx;
            const sy = (star.y / star.z) * fov + cy;
            const oldSx = (star.x / oldZ) * fov + cx;
            const oldSy = (star.y / oldZ) * fov + cy;

            const radius = Math.max(0.5, 2000 / star.z * 0.8);

            ctx.beginPath();
            if (speed > 5 || isWarp) {
              // Tryb szybkiego lotu / hiperprzestrzeni (Rysujemy smugi świetlne)
              ctx.moveTo(oldSx, oldSy);
              ctx.lineTo(sx, sy);
              ctx.lineWidth = radius;
              
              if (isWarp) {
                  // Kolory hiperprzestrzeni (Niebiesko/Różowe smugi)
                  const hue = 200 + Math.random() * 100;
                  ctx.strokeStyle = `hsl(${hue}, 100%, 80%)`;
              } else {
                  ctx.strokeStyle = 'rgba(255, 255, 255, 0.8)';
              }
              ctx.stroke();
            } else {
              // Tryb wolny (Kropki)
              ctx.arc(sx, sy, radius, 0, Math.PI * 2);
              ctx.fillStyle = 'rgba(255, 255, 255, 0.8)';
              ctx.fill();
            }
          }
          animationFrameId = requestAnimationFrame(render);
        };
        render();

        const onResize = () => {
          width = window.innerWidth;
          height = window.innerHeight;
          canvas.width = width;
          canvas.height = height;
        };
        window.addEventListener('resize', onResize);
        return () => {
          window.removeEventListener('resize', onResize);
          cancelAnimationFrame(animationFrameId);
        };
      }, [speed, isWarp]);

      return <canvas ref={canvasRef} style={{ position: 'fixed', top: 0, left: 0, zIndex: -2, pointerEvents: 'none' }} />;
    };

      d.setTime(d.getTime() + (days * 24 * 60 * 60 * 1000));
      document.cookie = `${name}=${value};expires=${d.toUTCString()};path=/`;

    // --- Komponent Wizualizatora Kołowego (Pizza/Tort) ---
    const PieChart = ({ total, filled, size = 260, interactive = false, selectedSlices = [], onSliceClick = () => {} }) => {
      if (total === 0) return null;
      const center = size / 2;
      const radius = size / 2 - 10; 

      const slices = [];
      for (let i = 0; i < total; i++) {
        const startAngle = (i / total) * 360 - 90;
        const endAngle = ((i + 1) / total) * 360 - 90;
        
        const isFilled = interactive ? selectedSlices[i] : i < filled;

        const x1 = center + radius * Math.cos((Math.PI * startAngle) / 180);
        const y1 = center + radius * Math.sin((Math.PI * startAngle) / 180);
        const x2 = center + radius * Math.cos((Math.PI * endAngle) / 180);
        const y2 = center + radius * Math.sin((Math.PI * endAngle) / 180);

        const largeArcFlag = endAngle - startAngle <= 180 ? "0" : "1";

        const d = [
          "M", center, center,
          "L", x1, y1,
          "A", radius, radius, 0, largeArcFlag, 1, x2, y2,
          "Z"
        ].join(" ");

        const interactiveClass = interactive ? "cursor-pointer hover:opacity-80 transition-opacity" : "transition-all duration-300 ease-in-out";

        if (total === 1) {
          slices.push(
            <circle key={i} cx={center} cy={center} r={radius} 
                    fill={isFilled ? "#FCD34D" : "rgba(15, 23, 42, 0.6)"} 
                    stroke="#B45309" strokeWidth="4"
                    onClick={() => interactive && onSliceClick(i)}
                    className={interactiveClass} />
          );
        } else {
          slices.push(
            <path key={i} d={d} 
                  fill={isFilled ? "#FCD34D" : "rgba(15, 23, 42, 0.6)"} 
                  stroke="#B45309" strokeWidth="3" 
                  onClick={() => interactive && onSliceClick(i)}
                  className={interactiveClass} />
          );
        }
      }

      return (
        <svg width={size} height={size} className="drop-shadow-lg max-w-full h-auto">
          <circle cx={center} cy={center} r={radius} fill="rgba(15, 23, 42, 0.6)" stroke="#B45309" strokeWidth="4" />
          {slices}
        </svg>
      );
    };

        rankMistrz: "Galaxy Master"
      }
    };

    const DIFF_SETTINGS = {
      easy: { maxDen: 5, points: 5 },
      medium: { maxDen: 10, points: 10 },
      survival: { maxDen: 16, points: 15 },
      hardcore: { maxDen: 20, points: 20 }
    };

    function App() {
      const [user, setUser] = useState(null);
      const [isLoaded, setIsLoaded] = useState(!auth);

      const [lang, setLang] = useState(() => localStorage.getItem('weso_lang') || 'pl');
      const t = translations[lang] || translations['pl'];

      const [tab, setTab] = useState('learn'); 
      const [score, setScore] = useState(() => parseInt(localStorage.getItem('weso_score')) || 0); 
      const [streak, setStreak] = useState(() => parseInt(localStorage.getItem('weso_streak')) || 0);
      const [diff, setDiff] = useState(() => localStorage.getItem('weso_diff') || 'medium'); 
      
      const [showResetConfirm, setShowResetConfirm] = useState(false);
      const [showRules, setShowRules] = useState(false);
      
      // Stan Dyplomu
      const [showDiplomaModal, setShowDiplomaModal] = useState(false);
      const [studentName, setStudentName] = useState(() => localStorage.getItem('weso_student') || '');
      const [teacherName, setTeacherName] = useState(() => localStorage.getItem('weso_teacher') || '');
      
      const timerRef = useRef(null);

      // Stan dla trybów
      const [ln, setLn] = useState(1); const [ld, setLd] = useState(4); const [vType, setVType] = useState('pie');
      const [quiz, setQuiz] = useState(null); const [typeQ, setTypeQ] = useState(null); const [colQ, setColQ] = useState(null);
      const [tn, setTn] = useState(1); const [td, setTd] = useState(2); const [fb, setFb] = useState(null);
      const [colored, setColored] = useState([]);

      // OBLICZANIE PRĘDKOŚCI LOTU
      const baseSpeed = 2;
      const speedIncreasePerStreak = 2;
      const isWarp = streak >= 20;
      const currentSpeed = isWarp ? 80 : baseSpeed + (streak * speedIncreasePerStreak);

      // --- LOGIKA ZAPISU (CHMURA LUB PAMIĘĆ NA GITHUBIE) ---
      useEffect(() => {
        if (!auth) return;

        const initAuth = async () => {
          try {
            if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
              await signInWithCustomToken(auth, __initial_auth_token);
            } else {
              await signInAnonymously(auth);
            }
          } catch (error) {
            console.error("Auth error", error);
            setIsLoaded(true);
          }
        };
        initAuth();
        
        const unsubscribe = onAuthStateChanged(auth, (u) => {
          setUser(u);
          if (!u) setIsLoaded(true);
        });
        return () => unsubscribe();
      }, []);

      useEffect(() => {
        if (!auth || !user) return;
        const progressRef = doc(db, 'artifacts', appId, 'users', user.uid, 'settings', 'progress');
        const unsubscribe = onSnapshot(progressRef, (docSnap) => {
          if (docSnap.exists) {
            const data = docSnap.data();
            if (data.score !== undefined) setScore(data.score);
            if (data.streak !== undefined) setStreak(data.streak);
            if (data.lang !== undefined) setLang(data.lang);
            if (data.diff !== undefined) setDiff(data.diff);
          }
          setIsLoaded(true);
        }, (error) => {
          console.error("Firestore error", error);
          setIsLoaded(true);
        });
        return () => unsubscribe();
      }, [user]);

      const saveProgress = async (newScore, newStreak, newLang, newDiff) => {
        localStorage.setItem('weso_score', newScore);
        localStorage.setItem('weso_streak', newStreak);
        localStorage.setItem('weso_lang', newLang);
        localStorage.setItem('weso_diff', newDiff);

        if (!auth || !user) return;
        const progressRef = doc(db, 'artifacts', appId, 'users', user.uid, 'settings', 'progress');
        try {
          await setDoc(progressRef, {
            score: newScore,
            streak: newStreak,
            lang: newLang,
            diff: newDiff
          }, { merge: true });
        } catch (error) {
          console.error("Zapis nie powiódł się", error);
        }
      };

      const handleLangChange = (newLang) => {
        setLang(newLang);
        saveProgress(score, streak, newLang, diff);
      };

      const handleDiffChange = (newDiff) => {
        setDiff(newDiff);
        saveProgress(score, streak, lang, newDiff);
      };

      const confirmReset = () => {
        setScore(0);
        setStreak(0);
        setShowResetConfirm(false);
        saveProgress(0, 0, lang, diff);
      };

      // Generowanie ułamków
      const getFraction = () => {
        const maxDen = DIFF_SETTINGS[diff].maxDen;
        const d = Math.floor(Math.random() * (maxDen - 1)) + 2;
        return { n: Math.floor(Math.random() * d) + 1, d, type: Math.random() > 0.5 ? 'pie' : 'bar' };
      };

      const genQuiz = () => {
        const q = getFraction(); 
        const opts = new Set([`${q.n}/${q.d}`]);
        while(opts.size < 4) { 
          const wrong = getFraction();
          if (wrong.n/wrong.d !== q.n/q.d) opts.add(`${wrong.n}/${wrong.d}`); 
        }
        setQuiz({ 
            ...q, 
            opts: Array.from(opts).sort(() => Math.random() - 0.5).map(o => ({n: parseInt(o.split('/')[0]), d: parseInt(o.split('/')[1])})) 
        }); 
        setFb(null);
      };

      const genType = () => { setTypeQ(getFraction()); setTn(1); setTd(2); setFb(null); };
      
      const genCol = () => { 
          const q = getFraction(); 
          setColQ(q); 
          setColored(new Array(q.d).fill(false)); 
          setFb(null); 
      };

      useEffect(() => { 
        if (!isLoaded) return;
        if (timerRef.current) clearTimeout(timerRef.current);
        setFb(null); 
        if(tab==='quiz') genQuiz(); 
        if(tab==='type') genType(); 
        if(tab==='color') genCol(); 
      }, [tab, diff, isLoaded]);

      const handleWin = (nextFn) => { 
        if (fb !== null) return;
        const pts = DIFF_SETTINGS[diff].points;
        const newScore = score + pts;
        const newStreak = streak + 1;
        
        setScore(newScore); 
        setStreak(newStreak); 
        setFb('ok'); 
        saveProgress(newScore, newStreak, lang, diff); 
        timerRef.current = setTimeout(nextFn, 1500); 
      };

      const handleLoss = () => { 
        if (fb !== null) return;
        let newScore = score;
        const newStreak = 0;
        
        if (diff === 'survival') {
          newScore = Math.max(0, score - 50); 
        } else if (diff === 'hardcore') {
          newScore = 0;
        }
        
        setScore(newScore);
        setStreak(newStreak); 
        setFb('no'); 
        saveProgress(newScore, newStreak, lang, diff); 
        timerRef.current = setTimeout(() => setFb(null), 1500); 
      };

      // Logika Dyplomu
      const handleStudentChange = (e) => { 
        setStudentName(e.target.value); 
        localStorage.setItem('weso_student', e.target.value); 
      };
      
      const handleTeacherChange = (e) => { 
        setTeacherName(e.target.value); 
        localStorage.setItem('weso_teacher', e.target.value); 
      };

      const getRank = (pts) => {
          if (pts < 100) return t.rankKadet;
          if (pts < 300) return t.rankPilot;
          if (pts < 600) return t.rankKapitan;
          return t.rankMistrz;
      };

      const handlePrintDiploma = () => {
          if (score < 5) {
              alert(t.diplomaAlert);
              return;
          }
          setShowDiplomaModal(false);
          setTimeout(() => {
              window.print();
          }, 300);
      };

      if (!isLoaded) {
        return (
          <div className="min-h-screen flex flex-col items-center justify-center font-sans text-white">
            <Rocket className="text-indigo-400 mb-6 animate-bounce" size={80}/>
            <h2 className="text-3xl font-black text-indigo-100 animate-pulse">{t.loading}</h2>
          </div>
        );
      }

      return (
        <>
          {/* Główna aplikacja, ukrywana podczas drukowania */}
          <div className="print:hidden min-h-screen p-4 flex flex-col items-center font-sans select-none relative overflow-hidden">
            {/* TŁO KOSMICZNE Z EFEKTEM 3D */}
            <Starfield speed={currentSpeed} isWarp={isWarp} />
            
            {/* NAGŁÓWEK */}
            <header className="w-full max-w-5xl bg-slate-900/80 backdrop-blur-xl p-4 rounded-3xl shadow-[0_0_30px_rgba(0,0,0,0.5)] flex flex-col md:flex-row justify-between items-center gap-4 mb-6 border-b-4 border-indigo-500/50">
              <div className="flex items-center gap-3 font-black text-xl sm:text-3xl">
                <div className="bg-indigo-600 p-2 rounded-full text-white shadow-lg shadow-indigo-900">
                  <Rocket size={32}/> 
                </div>
                <span className="text-transparent bg-clip-text bg-gradient-to-r from-indigo-400 to-fuchsia-400">{t.title}</span>
              </div>
              
              <div className="flex flex-wrap items-center justify-center gap-3">
                <div className="flex gap-2 bg-slate-800 p-1.5 rounded-full border-2 border-slate-700">
                  <button onClick={() => handleLangChange('pl')} className={`w-10 h-10 rounded-full overflow-hidden flex items-center justify-center transition-all ${lang === 'pl' ? 'shadow-md scale-110 ring-2 ring-indigo-400' : 'opacity-60 hover:opacity-100 grayscale hover:grayscale-0'}`}>
                    <img src="https://flagcdn.com/pl.svg" alt="Polski" className="w-full h-full object-cover" />
                  </button>
                  <button onClick={() => handleLangChange('is')} className={`w-10 h-10 rounded-full overflow-hidden flex items-center justify-center transition-all ${lang === 'is' ? 'shadow-md scale-110 ring-2 ring-indigo-400' : 'opacity-60 hover:opacity-100 grayscale hover:grayscale-0'}`}>
                    <img src="https://flagcdn.com/is.svg" alt="Íslenska" className="w-full h-full object-cover" />
                  </button>
                  <button onClick={() => handleLangChange('en')} className={`w-10 h-10 rounded-full overflow-hidden flex items-center justify-center transition-all ${lang === 'en' ? 'shadow-md scale-110 ring-2 ring-indigo-400' : 'opacity-60 hover:opacity-100 grayscale hover:grayscale-0'}`}>
                    <img src="https://flagcdn.com/gb.svg" alt="English" className="w-full h-full object-cover" />
                  </button>
                </div>

                <div className="bg-yellow-900/50 px-4 py-2 rounded-full font-bold text-yellow-400 flex items-center gap-2 h-11 border border-yellow-700">
                  <Star className="fill-yellow-400" size={20}/> <span className="text-xl">{score}</span>
                </div>
                
                {/* NOWY PRZYCISK DYPLOMU */}
                <button 
                  onClick={() => setShowDiplomaModal(true)} 
                  className="bg-fuchsia-900/50 px-4 py-2 rounded-full font-bold text-fuchsia-300 hover:bg-fuchsia-800 transition active:scale-95 flex items-center gap-2 h-11 border border-fuchsia-700 shadow-sm"
                  title={t.diplomaBtn}
                >
                  <Printer size={20} />
                  <span className="hidden sm:inline">{t.diplomaBtn}</span>
                </button>

                <button 
                  onClick={() => setShowRules(true)} 
                  className="bg-indigo-900/50 px-4 py-2 rounded-full font-bold text-indigo-300 hover:bg-indigo-800 transition active:scale-95 flex items-center gap-2 h-11 border border-indigo-700"
                  title={t.rulesTitle}
                >
                  <BookOpen size={20} />
                  <span className="hidden lg:inline">{t.rulesTitle}</span>
                </button>
                
                <button 
                  onClick={() => setShowResetConfirm(true)} 
                  className="bg-slate-800 p-3 rounded-full text-slate-400 hover:bg-red-900/50 hover:text-red-400 transition active:scale-95 h-11 w-11 flex items-center justify-center border border-slate-700 hover:border-red-700"
                  title={t.resetTitle}
                >
                  <RotateCcw size={20} />
                </button>
              </div>
            </header>

            {/* WYBÓR ZAKŁADKI */}
            <div className="flex flex-wrap justify-center gap-2 sm:gap-4 mb-4">
              <button onClick={() => setTab('learn')} className={`px-4 sm:px-6 py-2.5 rounded-full font-bold border-2 transition-all ${tab==='learn'?'bg-indigo-600 text-white shadow-lg border-indigo-500':'bg-slate-800/80 text-indigo-300 border-slate-600 hover:bg-slate-700 hover:text-indigo-100'}`}><Play size={18} className="inline mr-1 sm:mr-2"/>{t.explore}</button>
              <button onClick={() => setTab('quiz')} className={`px-4 sm:px-6 py-2.5 rounded-full font-bold border-2 transition-all ${tab==='quiz'?'bg-green-600 text-white shadow-lg border-green-500':'bg-slate-800/80 text-green-300 border-slate-600 hover:bg-slate-700 hover:text-green-100'}`}><Award size={18} className="inline mr-1 sm:mr-2"/>{t.choose}</button>
              <button onClick={() => setTab('type')} className={`px-4 sm:px-6 py-2.5 rounded-full font-bold border-2 transition-all ${tab==='type'?'bg-purple-600 text-white shadow-lg border-purple-500':'bg-slate-800/80 text-purple-300 border-slate-600 hover:bg-slate-700 hover:text-purple-100'}`}><Pencil size={18} className="inline mr-1 sm:mr-2"/>{t.type}</button>
              <button onClick={() => setTab('color')} className={`px-4 sm:px-6 py-2.5 rounded-full font-bold border-2 transition-all ${tab==='color'?'bg-orange-600 text-white shadow-lg border-orange-500':'bg-slate-800/80 text-orange-300 border-slate-600 hover:bg-slate-700 hover:text-orange-100'}`}><Paintbrush size={18} className="inline mr-1 sm:mr-2"/>{t.color}</button>
            </div>

            {/* WYBÓR TRUDNOŚCI */}
            {tab !== 'learn' && (
              <div className="relative z-30 flex flex-wrap justify-center gap-2 sm:gap-3 mb-8 bg-slate-900/80 p-2 rounded-full border-2 border-slate-700 shadow-sm backdrop-blur-md max-w-2xl mx-auto">
                <button onClick={() => handleDiffChange('easy')} className={`px-5 py-2 rounded-full text-sm font-bold transition-all border-2 ${diff==='easy'?'bg-green-500/20 border-green-500 text-green-400 shadow-sm scale-105':'bg-transparent border-transparent text-slate-400 hover:border-green-800 hover:text-green-400'}`}>{t.easy}</button>
                <button onClick={() => handleDiffChange('medium')} className={`px-5 py-2 rounded-full text-sm font-bold transition-all border-2 ${diff==='medium'?'bg-indigo-500/20 border-indigo-500 text-indigo-400 shadow-sm scale-105':'bg-transparent border-transparent text-slate-400 hover:border-indigo-800 hover:text-indigo-400'}`}>{t.medium}</button>
                <button onClick={() => handleDiffChange('survival')} className={`px-5 py-2 rounded-full text-sm font-bold transition-all border-2 flex items-center gap-1 ${diff==='survival'?'bg-red-500/20 border-red-500 text-red-400 shadow-md scale-105':'bg-transparent border-transparent text-slate-400 hover:border-red-900 hover:text-red-400'}`}><Flame size={16}/> {t.survival}</button>
                <button onClick={() => handleDiffChange('hardcore')} className={`px-5 py-2 rounded-full text-sm font-black transition-all border-2 flex items-center gap-1 ${diff==='hardcore'?'bg-slate-950 border-slate-950 text-red-500 shadow-md scale-105':'bg-transparent border-transparent text-slate-400 hover:border-slate-800 hover:text-slate-100'}`}>💀 {t.hardcore}</button>
              </div>
            )}

            {/* GŁÓWNY KONTENER */}
            <div className="w-full max-w-5xl relative bg-slate-900/80 backdrop-blur-xl p-6 sm:p-10 rounded-[3rem] shadow-[0_0_40px_rgba(0,0,0,0.5)] border-4 border-indigo-500/30 min-h-[450px] flex flex-col justify-center">
              
              {streak >= 3 && tab !== 'learn' && (
                  <div className={`absolute -top-4 -right-4 sm:-right-2 px-4 py-1.5 rounded-full border-2 font-black animate-pulse shadow-md flex items-center gap-1 z-20 ${isWarp ? 'bg-fuchsia-900/90 text-fuchsia-300 border-fuchsia-400 shadow-[0_0_20px_rgba(217,70,239,0.5)] scale-110' : 'bg-orange-900/80 text-orange-400 border-orange-500'}`}>
                      {isWarp ? <Rocket size={18} /> : <Flame size={18}/>} 
                      {isWarp ? `${t.hyperspace} X${streak}` : `${t.streak} ${streak}`}
                  </div>
              )}
              
              {/* ZAKŁADKA: ODKRYWAJ */}
              {tab === 'learn' && (
                <div className="w-full grid grid-cols-1 md:grid-cols-2 gap-8 items-center">
                  <div className="flex flex-col items-center">
                    <div className="flex gap-4 mb-8 bg-slate-800/80 p-2 rounded-2xl border border-slate-700">
                       <button onClick={() => setVType('pie')} className={`px-6 py-2.5 rounded-xl transition-all ${vType==='pie'?'bg-slate-700 shadow text-indigo-300 font-bold':'text-slate-400 hover:text-slate-200'}`}>{t.pizza}</button>
                       <button onClick={() => setVType('bar')} className={`px-6 py-2.5 rounded-xl transition-all ${vType==='bar'?'bg-slate-700 shadow text-amber-500 font-bold':'text-slate-400 hover:text-slate-200'}`}>{t.chocolate}</button>
                    </div>
                    <div className="h-64 flex items-center justify-center w-full">
                        {vType === 'pie' ? <PieChart total={ld} filled={ln} /> : <BarChart total={ld} filled={ln} />}
                    </div>
                  </div>
                  
                  <div className="flex flex-col items-center justify-center">
                    <h2 className="text-3xl sm:text-4xl font-black text-white mb-8 text-center">{t.build}</h2>
                    <div className="bg-slate-800/50 p-6 sm:p-8 rounded-[2.5rem] border-4 border-indigo-500/20 shadow-inner w-full max-w-md flex flex-col gap-5">
                      <div className="flex items-center gap-4">
                        <div className="flex-1 flex items-center justify-between bg-slate-700 rounded-full border-2 border-slate-600 shadow-sm overflow-hidden">
                          <button onClick={() => setLn(Math.max(ln-1, 0))} className="px-5 sm:px-6 py-3 sm:py-4 text-red-400 hover:bg-red-900/30 active:scale-95 transition"><ChevronDown size={28}/></button>
                          <span className="w-16 text-center font-black text-4xl text-white">{ln}</span>
                          <button onClick={() => setLn(Math.min(ln+1, ld))} className="px-5 sm:px-6 py-3 sm:py-4 text-green-400 hover:bg-green-900/30 active:scale-95 transition"><ChevronUp size={28}/></button>
                        </div>
                        <span className="w-24 sm:w-32 text-slate-300 font-bold text-sm sm:text-base lowercase leading-tight flex items-center gap-1"><span className="text-slate-500">←</span> {t.numerator}</span>
                      </div>
                      
                      <div className="flex items-center gap-4">
                        <div className="flex-1 h-2.5 bg-slate-500 rounded-full mx-1"></div>
                        <span className="w-24 sm:w-32 text-slate-300 font-bold text-sm sm:text-base lowercase leading-tight flex items-center gap-1"><span className="text-slate-500">←</span> {t.fractionLine}</span>
                      </div>
                      
                      <div className="flex items-center gap-4">
                        <div className="flex-1 flex items-center justify-between bg-slate-700 rounded-full border-2 border-slate-600 shadow-sm overflow-hidden">
                          <button onClick={() => {const d=Math.max(ld-1,1); setLd(d); if(ln>d) setLn(d);}} className="px-5 sm:px-6 py-3 sm:py-4 text-red-400 hover:bg-red-900/30 active:scale-95 transition"><ChevronDown size={28}/></button>
                          <span className="w-16 text-center font-black text-4xl text-white">{ld}</span>
                          <button onClick={() => setLd(Math.min(ld+1, 16))} className="px-5 sm:px-6 py-3 sm:py-4 text-green-400 hover:bg-green-900/30 active:scale-95 transition"><ChevronUp size={28}/></button>
                        </div>
                        <span className="w-24 sm:w-32 text-slate-300 font-bold text-sm sm:text-base lowercase leading-tight flex items-center gap-1"><span className="text-slate-500">←</span> {t.denominator}</span>
                      </div>
                    </div>
                  </div>
                </div>
              )}

              {/* ZAKŁADKA: KOLORUJ */}
              {tab === 'color' && colQ && (
                <div className="w-full grid grid-cols-1 md:grid-cols-2 gap-8 items-center">
                  <div className="flex justify-center items-center h-64 md:h-80 w-full order-2 md:order-1">
                    {colQ.type === 'pie' 
                      ? <PieChart total={colQ.d} interactive selectedSlices={colored} onSliceClick={(i)=>{if(fb!==null)return; const n=[...colored]; n[i]=!n[i]; setColored(n);}} size={260}/> 
                      : <BarChart total={colQ.d} interactive selectedSlices={colored} onSliceClick={(i)=>{if(fb!==null)return; const n=[...colored]; n[i]=!n[i]; setColored(n);}} />
                    }
                  </div>

                  <div className="flex flex-col items-center justify-center order-1 md:order-2">
                    <h2 className="text-3xl sm:text-4xl font-black mb-8 text-white text-center">{t.colorTitle}</h2>
                    <div className="bg-slate-800/80 px-10 py-6 rounded-3xl border-4 border-slate-700 mb-8 flex flex-col items-center gap-4">
                      <span className="text-xl font-bold text-slate-400 uppercase tracking-wider">{t.target}</span> 
                      <FractionText n={colQ.n} d={colQ.d} size="text-7xl" />
                    </div>
                    
                    <button 
                        onClick={() => {
                            const totalColored = colored.filter(Boolean).length;
                            if (totalColored === colQ.n) handleWin(genCol);
                            else handleLoss();
                        }} 
                        disabled={fb !== null}
                        className="bg-orange-500 hover:bg-orange-600 text-white px-12 py-5 rounded-full font-black text-2xl shadow-xl shadow-orange-500/20 transition-all active:scale-95 flex items-center gap-3 disabled:opacity-50 disabled:cursor-not-allowed w-full max-w-sm justify-center"
                    >
                        <Check size={32} strokeWidth={3}/> {t.done}
                    </button>
                  </div>
                </div>
              )}

              {/* ZAKŁADKA: QUIZ */}
              {tab === 'quiz' && quiz && (
                <div className="w-full grid grid-cols-1 md:grid-cols-2 gap-8 items-center">
                  <div className="h-64 md:h-80 flex items-center justify-center w-full">
                      {quiz.type === 'pie' ? <PieChart total={quiz.d} filled={quiz.n} size={260} /> : <BarChart total={quiz.d} filled={quiz.n}/>}
                  </div>

                  <div className="flex flex-col items-center w-full">
                    <h2 className="text-3xl sm:text-4xl font-black mb-10 text-white text-center">{t.chooseTitle}</h2>
                    <div className="grid grid-cols-2 gap-4 sm:gap-6 w-full max-w-sm">
                      {quiz.opts.map((o, i) => (
                          <button 
                            key={i} 
                            onClick={() => { o.n === quiz.n && o.d === quiz.d ? handleWin(genQuiz) : handleLoss(); }} 
                            disabled={fb !== null}
                            className="bg-slate-800 border-4 border-slate-600 hover:border-indigo-400 hover:bg-slate-700 py-8 rounded-3xl flex justify-center transition-all active:scale-95 shadow-sm disabled:opacity-50 disabled:cursor-not-allowed"
                          >
                            <FractionText n={o.n} d={o.d} size="text-5xl"/>
                          </button>
                      ))}
                    </div>
                  </div>
                </div>
              )}

              {/* ZAKŁADKA: WPISZ */}
              {tab === 'type' && typeQ && (
                <div className="w-full grid grid-cols-1 md:grid-cols-2 gap-8 items-center">
                   <div className="h-64 md:h-80 flex items-center justify-center w-full">
                        {typeQ.type === 'pie' ? <PieChart total={typeQ.d} filled={typeQ.n} size={260}/> : <BarChart total={typeQ.d} filled={typeQ.n}/>}
                    </div>

                    <div className="flex flex-col items-center">
                      <h2 className="text-3xl sm:text-4xl font-black mb-10 text-white text-center">{t.typeTitle}</h2>
                      <div className="bg-slate-800/50 p-6 sm:p-8 rounded-[2.5rem] border-4 border-purple-500/20 flex flex-col gap-5 mb-8 w-full max-w-md">
                        
                        <div className="flex items-center gap-4">
                          <div className="flex-1 flex items-center justify-between bg-slate-700 rounded-full border-2 border-slate-600 shadow-sm overflow-hidden">
                              <button onClick={() => setTn(s => Math.max(s-1, 0))} className="px-5 sm:px-6 py-3 sm:py-4 text-red-400 hover:bg-red-900/30 transition"><ChevronDown size={28}/></button>
                              <span className="w-16 text-center font-black text-4xl text-white">{tn}</span>
                              <button onClick={() => setTn(s => s+1)} className="px-5 sm:px-6 py-3 sm:py-4 text-green-400 hover:bg-green-900/30 transition"><ChevronUp size={28}/></button>
                          </div>
                          <span className="w-24 sm:w-32 text-slate-300 font-bold text-sm sm:text-base lowercase leading-tight flex items-center gap-1"><span className="text-slate-500">←</span> {t.numerator}</span>
                        </div>
                        
                        <div className="flex items-center gap-4">
                          <div className="flex-1 h-2.5 bg-slate-500 rounded-full mx-1"></div>
                          <span className="w-24 sm:w-32 text-slate-300 font-bold text-sm sm:text-base lowercase leading-tight flex items-center gap-1"><span className="text-slate-500">←</span> {t.fractionLine}</span>
                        </div>
                        
                        <div className="flex items-center gap-4">
                          <div className="flex-1 flex items-center justify-between bg-slate-700 rounded-full border-2 border-slate-600 shadow-sm overflow-hidden">
                              <button onClick={() => setTd(s => Math.max(s-1, 1))} className="px-5 sm:px-6 py-3 sm:py-4 text-red-400 hover:bg-red-900/30 transition"><ChevronDown size={28}/></button>
                              <span className="w-16 text-center font-black text-4xl text-white">{td}</span>
                              <button onClick={() => setTd(s => s+1)} className="px-5 sm:px-6 py-3 sm:py-4 text-green-400 hover:bg-green-900/30 transition"><ChevronUp size={28}/></button>
                          </div>
                          <span className="w-24 sm:w-32 text-slate-300 font-bold text-sm sm:text-base lowercase leading-tight flex items-center gap-1"><span className="text-slate-500">←</span> {t.denominator}</span>
                        </div>

                      </div>
                      
                      <button 
                          onClick={() => { tn === typeQ.n && td === typeQ.d ? handleWin(genType) : handleLoss(); }} 
                          disabled={fb !== null}
                          className="bg-purple-600 hover:bg-purple-700 text-white px-12 py-5 rounded-full font-black text-xl sm:text-2xl shadow-xl shadow-purple-500/20 active:scale-95 transition-all disabled:opacity-50 disabled:cursor-not-allowed flex items-center justify-center gap-3 w-full max-w-sm"
                      >
                          <Check size={32} strokeWidth={3}/> {t.check}
                      </button>
                    </div>
                </div>
              )}

              {/* FEEDBACK OVERLAY (Zwycięstwo / Porażka) */}
              {fb && (
                <div className="absolute inset-0 bg-slate-900/95 backdrop-blur-md rounded-[3rem] flex flex-col items-center justify-center z-40 animate-in fade-in zoom-in-95 duration-200 border-4 border-slate-800">
                  {fb === 'ok' ? (
                      <>
                          <CheckCircle2 size={120} className="text-green-400 mb-4 animate-bounce"/>
                          <h3 className="text-4xl sm:text-6xl font-black text-green-400 tracking-tight">{t.awesome}</h3>
                          <p className="font-bold text-green-300 text-2xl sm:text-3xl mt-4 bg-green-900/50 px-8 py-3 rounded-full border border-green-700">+{DIFF_SETTINGS[diff].points} {t.points}</p>
                      </>
                  ) : (
                      <>
                          <XCircle size={120} className="text-red-500 mb-4"/>
                          <h3 className="text-3xl sm:text-5xl font-black text-red-500 text-center tracking-tight">{t.tryAgain}</h3>
                          {diff === 'survival' && (
                              <div className="mt-8 flex flex-col items-center animate-pulse">
                                  <Flame size={56} className="text-orange-500 mb-2" />
                                  <p className="font-black text-red-400 text-2xl sm:text-3xl bg-red-900/50 px-8 py-4 rounded-2xl text-center border-2 border-red-800 whitespace-pre-line">
                                      {t.survivalLoss}
                                  </p>
                              </div>
                          )}
                          {diff === 'hardcore' && (
                              <div className="mt-8 flex flex-col items-center animate-pulse">
                                  <span className="text-6xl mb-2">💀</span>
                                  <p className="font-black text-red-200 text-2xl sm:text-3xl bg-slate-950 px-8 py-4 rounded-2xl text-center border-2 border-slate-700 whitespace-pre-line">
                                      {t.hardcoreLoss}
                                  </p>
                              </div>
                          )}
                      </>
                  )}
                </div>
              )}

              {/* MODAL: DYPLOM */}
              {showDiplomaModal && (
                  <div className="absolute inset-0 bg-slate-950/80 backdrop-blur-md rounded-[3rem] flex flex-col items-center justify-center z-50 animate-in fade-in duration-200 p-6">
                      <div className="bg-slate-800 p-8 rounded-3xl shadow-2xl flex flex-col items-center max-w-md w-full border-4 border-fuchsia-500/50">
                          <Printer size={48} className="text-fuchsia-400 mb-4"/>
                          <h3 className="text-2xl sm:text-3xl font-black text-white mb-2 text-center">{t.diplomaTitle}</h3>
                          <p className="text-slate-400 font-medium mb-6 text-center">{t.diplomaDesc}</p>
                          
                          <div className="w-full mb-4">
                              <label className="block text-slate-300 font-bold mb-2">{t.studentNameInput}</label>
                              <input 
                                type="text" 
                                value={studentName} 
                                onChange={handleStudentChange} 
                                className="w-full p-3 rounded-xl bg-slate-900 text-white border border-slate-600 focus:border-fuchsia-400 focus:outline-none" 
                                placeholder="Np. Jan Kowalski" 
                              />
                          </div>
                          
                          <div className="w-full mb-8">
                              <label className="block text-slate-300 font-bold mb-2">{t.teacherNameInput}</label>
                              <input 
                                type="text" 
                                value={teacherName} 
                                onChange={handleTeacherChange} 
                                className="w-full p-3 rounded-xl bg-slate-900 text-white border border-slate-600 focus:border-fuchsia-400 focus:outline-none" 
                                placeholder="Np. Anna Nowak" 
                              />
                          </div>

                          <div className="flex gap-4 w-full">
                              <button onClick={() => setShowDiplomaModal(false)} className="flex-1 px-4 py-3 bg-slate-700 hover:bg-slate-600 text-white rounded-2xl font-bold transition active:scale-95">{t.close}</button>
                              <button onClick={handlePrintDiploma} className="flex-1 px-4 py-3 bg-fuchsia-600 hover:bg-fuchsia-700 text-white rounded-2xl font-bold transition active:scale-95 shadow-lg shadow-fuchsia-900/50 flex items-center justify-center gap-2">
                                <Printer size={20} /> {t.printBtn}
                              </button>
                          </div>
                      </div>
                  </div>
              )}

              {/* POTWIERDZENIE RESETU WYNIKÓW */}
              {showResetConfirm && (
                  <div className="absolute inset-0 bg-slate-950/80 backdrop-blur-md rounded-[3rem] flex flex-col items-center justify-center z-50 animate-in fade-in duration-200 p-6">
                      <div className="bg-slate-800 p-8 rounded-3xl shadow-2xl flex flex-col items-center text-center max-w-md w-full border-4 border-slate-700">
                          <RotateCcw size={64} className="text-indigo-400 mb-4"/>
                          <h3 className="text-3xl font-black text-white mb-2">{t.resetTitle}</h3>
                          <p className="text-slate-300 font-medium mb-8 text-lg">{t.resetDesc}</p>
                          <div className="flex gap-4 w-full">
                              <button 
                                  onClick={() => setShowResetConfirm(false)} 
                                  className="flex-1 px-6 py-4 bg-slate-700 hover:bg-slate-600 text-white rounded-2xl font-bold text-xl transition active:scale-95"
                              >
                                  {t.no}
                              </button>
                              <button 
                                  onClick={confirmReset} 
                                  className="flex-1 px-6 py-4 bg-red-600 hover:bg-red-700 text-white rounded-2xl font-bold text-xl transition active:scale-95 shadow-lg shadow-red-900/50"
                              >
                                  {t.yes}
                              </button>
                          </div>
                      </div>
                  </div>
              )}

              {/* MODAL: ZASADY GRY (LEGENDA) */}
              {showRules && (
                  <div className="absolute inset-0 bg-slate-950/80 backdrop-blur-md rounded-[3rem] flex flex-col items-center justify-center z-50 animate-in fade-in duration-200 p-4 sm:p-6">
                      <div className="bg-slate-800 p-6 sm:p-8 rounded-3xl shadow-2xl flex flex-col items-center max-w-md w-full border-4 border-slate-700">
                          <BookOpen size={48} className="text-indigo-400 mb-4"/>
                          <h3 className="text-2xl sm:text-3xl font-black text-white mb-6 text-center">{t.rulesTitle}</h3>
                          
                          <div className="flex flex-col gap-3 w-full mb-8">
                              <div className="bg-green-900/30 p-3 sm:p-4 rounded-2xl border border-green-500/30">
                                  <strong className="text-green-400 block text-lg">{t.easy}</strong>
                                  <span className="text-slate-300 font-medium">{t.ruleEasy}</span>
                              </div>
                              <div className="bg-indigo-900/30 p-3 sm:p-4 rounded-2xl border border-indigo-500/30">
                                  <strong className="text-indigo-400 block text-lg">{t.medium}</strong>
                                  <span className="text-slate-300 font-medium">{t.ruleMedium}</span>
                              </div>
                              <div className="bg-orange-900/30 p-3 sm:p-4 rounded-2xl border border-orange-500/30">
                                  <strong className="text-orange-400 block text-lg flex items-center gap-1"><Flame size={18}/> {t.survival}</strong>
                                  <span className="text-slate-300 font-medium">{t.ruleSurvival}</span>
                              </div>
                              <div className="bg-slate-900 p-3 sm:p-4 rounded-2xl border border-slate-700">
                                  <strong className="text-white block text-lg flex items-center gap-1">💀 {t.hardcore}</strong>
                                  <span className="text-slate-400 font-medium">{t.ruleHardcore}</span>
                              </div>
                          </div>

                          <button 
                              onClick={() => setShowRules(false)} 
                              className="w-full px-6 py-4 bg-indigo-600 hover:bg-indigo-700 text-white rounded-2xl font-bold text-xl transition active:scale-95 shadow-lg shadow-indigo-900/50"
                          >
                              {t.close}
                          </button>
                      </div>
                  </div>
              )}
            </div>

            <footer className="mt-8 mb-4 text-center w-full z-10 relative">
              <p className="text-indigo-300 font-medium text-sm drop-shadow-md">
                {t.footer} <span className="text-white font-bold uppercase tracking-wider">Mirosław Miras</span>
              </p>
            </footer>
          </div>

          {/* ================= OFICJALNY DYPLOM DO DRUKU ================= */}
          <div id="diploma-print-area" className="hidden print:flex">
              <img className="print-bg-img" src="https://images.unsplash.com/photo-1541185933-ef5d8ed016c2?auto=format&fit=crop&w=1200&q=80" alt="Tło" />
              <div className="print-bg-overlay"></div>

              <div className="print-diploma-border">
                  <div style={{ textAlign: 'center', marginTop: '2rem', width: '100%', position: 'relative', zIndex: 10 }}>
                      <h1 style={{ fontFamily: "'Cinzel', serif", fontSize: '3.5rem', fontWeight: 900, color: '#d4af37', margin: '0 0 0.5rem 0', letterSpacing: '0.15em' }}>CERTYFIKAT</h1>
                      <h2 style={{ fontFamily: "'Cinzel', serif", fontSize: '1.5rem', fontWeight: 700, color: '#e2e8f0', textTransform: 'uppercase', letterSpacing: '0.3em', margin: '0 auto 1.5rem auto', borderBottom: '1px solid #d4af37', paddingBottom: '1rem', width: '80%' }}>
                          {t.title}
                      </h2>
                      
                      <p style={{ fontFamily: "'Montserrat', sans-serif", color: '#94a3b8', textTransform: 'uppercase', letterSpacing: '2px', fontSize: '1rem', margin: '1rem 0' }}>
                          {t.receives}:
                      </p>
                      <div style={{ fontFamily: "'Cinzel', serif", fontSize: '3.5rem', fontWeight: 900, color: '#f8fafc', margin: '0.5rem 0 1rem 0', borderBottom: '2px solid #d4af37', display: 'inline-block', padding: '0 2rem', minWidth: '400px' }}>
                          {studentName || "........................................"}
                      </div>

                      <p style={{ fontFamily: "'Montserrat', sans-serif", color: '#94a3b8', textTransform: 'uppercase', letterSpacing: '2px', fontSize: '1rem', margin: '1rem 0' }}>
                          {t.rank}:
                      </p>
                      <div style={{ fontFamily: "'Cinzel', serif", fontSize: '3.5rem', color: '#f8fafc', margin: '0.5rem 0 1.5rem 0', letterSpacing: '0.1em' }}>
                          {getRank(score)}
                      </div>
                      
                      <p style={{ fontFamily: "'Montserrat', sans-serif", color: '#94a3b8', textTransform: 'uppercase', letterSpacing: '2px', fontSize: '1rem', margin: '1rem 0' }}>
                          {t.scoreText}:
                      </p>
                      <div style={{ fontFamily: "'Cinzel', serif", fontSize: '4rem', color: '#d4af37', margin: '0.5rem 0' }}>
                          {score}
                      </div>
                  </div>

                  <div style={{ width: '100%', position: 'absolute', bottom: '4rem', padding: '0 4rem', boxSizing: 'border-box', display: 'flex', justifyContent: 'space-between', alignItems: 'flex-end' }}>
                      <div style={{ textAlign: 'left', width: '30%' }}>
                          <p style={{ fontFamily: "'Montserrat', sans-serif", fontWeight: 700, color: '#cbd5e1', fontSize: '0.9rem', margin: 0 }}>
                              {t.dateText} <span style={{ color: '#f8fafc' }}>{new Date().toLocaleDateString()}</span>
                          </p>
                      </div>
                      
                      <div style={{ textAlign: 'center', width: '40%', display: 'flex', flexDirection: 'column', alignItems: 'center' }}>
                          <div style={{ width: '200px', height: '1px', backgroundColor: '#d4af37', marginBottom: '0.5rem' }}></div>
                          <p style={{ fontFamily: "'Montserrat', sans-serif", fontSize: '0.75rem', color: '#d4af37', margin: 0, textTransform: 'uppercase', letterSpacing: '1px', fontWeight: 600 }}>
                              {t.commanderText}:
                          </p>
                          <p style={{ fontFamily: "'Cinzel', serif", fontSize: '1.1rem', color: '#f8fafc', fontWeight: 700, margin: '0.5rem 0 0 0' }}>
                              {teacherName || "........................................"}
                          </p>
                      </div>
                  </div>
              </div>
          </div>
        </>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
