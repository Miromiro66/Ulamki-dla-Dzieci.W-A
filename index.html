<html lang="pl">

  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

  <!-- Babel (do obsługi JSX w przeglądarce) -->

  <!-- Firebase (wersja compat dla plików HTML) -->

  <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore-compat.js"></script>
</head>
<body class="bg-blue-50 text-slate-900">
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    // --- Wbudowane ikony SVG (Zamiast awaryjnej biblioteki zewnętrznej) ---
    const iconPaths = {
      Star: '<polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"></polygon>',
      Award: '<circle cx="12" cy="8" r="7"></circle><polyline points="8.21 13.89 7 23 12 20 17 23 15.79 13.88"></polyline>',
      Smile: '<circle cx="12" cy="12" r="10"></circle><path d="M8 14s1.5 2 4 2 4-2 4-2"></path><line x1="9" y1="9" x2="9.01" y2="9"></line><line x1="15" y1="9" x2="15.01" y2="9"></line>',
      Play: '<polygon points="5 3 19 12 5 21 5 3"></polygon>',
      CheckCircle2: '<circle cx="12" cy="12" r="10"></circle><polyline points="16 8 10 14 8 12"></polyline>',
      XCircle: '<circle cx="12" cy="12" r="10"></circle><line x1="15" y1="9" x2="9" y2="15"></line><line x1="9" y1="9" x2="15" y2="15"></line>',
      ChevronUp: '<polyline points="18 15 12 9 6 15"></polyline>',
      ChevronDown: '<polyline points="6 9 12 15 18 9"></polyline>',
      Pencil: '<path d="M17 3a2.828 2.828 0 1 1 4 4L7.5 20.5 2 22l1.5-5.5L17 3z"></path>',
      Paintbrush: '<path d="M18.37 2.63 14 7l-1.59-1.59a2 2 0 0 0-2.82 0L8 7l9 9 1.59-1.59a2 2 0 0 0 0-2.82L17 10l4.37-4.37a2.12 2.12 0 1 0-3-3Z"></path><path d="M9 8c-2 3-4 3.5-7 4l8 8c.5-3 1-5 4-7"></path>',
      Check: '<polyline points="20 6 9 17 4 12"></polyline>',
      RotateCcw: '<polyline points="1 4 1 10 7 10"></polyline><path d="M3.51 15a9 9 0 1 0 2.13-9.36L1 10"></path>',
      Flame: '<path d="M8.5 14.5A2.5 2.5 0 0 0 11 12c0-1.38-.5-2-1-3-1.072-2.143-.224-4.054 2-6 .5 2.5 2 4.9 4 6.5 2 1.6 3 3.5 3 5.5a7 7 0 1 1-14 0c0-1.153.433-2.294 1-3a2.5 2.5 0 0 0 2.5 2.5z"></path>',
      BookOpen: '<path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"></path><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"></path>'
    };

    const createIcon = (name) => ({ size = 24, className = "", fill = "none", ...props }) => (
      <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill={fill} stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className} dangerouslySetInnerHTML={{ __html: iconPaths[name] }} {...props} />
    );

    const Star = createIcon('Star');
    const Award = createIcon('Award');
    const Smile = createIcon('Smile');
    const Play = createIcon('Play');
    const CheckCircle2 = createIcon('CheckCircle2');
    const XCircle = createIcon('XCircle');
    const ChevronUp = createIcon('ChevronUp');
    const ChevronDown = createIcon('ChevronDown');
    const Pencil = createIcon('Pencil');
    const Paintbrush = createIcon('Paintbrush');
    const Check = createIcon('Check');
    const RotateCcw = createIcon('RotateCcw');
    const Flame = createIcon('Flame');
    const BookOpen = createIcon('BookOpen');

    // --- Inicjalizacja Bazy Danych Firebase (Wrapper do starej składni dla HTML) ---
    const initializeApp = (cfg) => firebase.initializeApp(cfg);
    const getAuth = (app) => firebase.auth(app);
    const signInWithCustomToken = (auth, token) => auth.signInWithCustomToken(token);
    const signInAnonymously = (auth) => auth.signInAnonymously();
    const onAuthStateChanged = (auth, cb) => auth.onAuthStateChanged(cb);
    const getFirestore = (app) => firebase.firestore(app);
    const doc = (db, ...paths) => db.doc(paths.join('/'));
    const setDoc = (ref, data, opts) => ref.set(data, opts);
    const onSnapshot = (ref, cb, err) => ref.onSnapshot(cb, err);

    let firebaseConfig = null;
    try {
      if (typeof __firebase_config !== 'undefined' && __firebase_config) {
        firebaseConfig = JSON.parse(__firebase_config);
      }
    } catch (e) {}

    let app = null, auth = null, db = null;
    if (firebaseConfig && Object.keys(firebaseConfig).length > 0) {
      try {
        app = initializeApp(firebaseConfig);
        auth = getAuth(app);
        db = getFirestore(app);
      } catch(e) {}
    }
    const appId = typeof __app_id !== 'undefined' ? __app_id : 'default-app-id';

    // --- Funkcje pomocnicze do zapisu (Dla Twojego GitHuba, oparte o pliki cookie) ---
    const setCookie = (name, value, days = 365) => {
      const d = new Date();
      d.setTime(d.getTime() + (days * 24 * 60 * 60 * 1000));
      document.cookie = `${name}=${value};expires=${d.toUTCString()};path=/`;
    };

    const getCookie = (name) => {
      const match = document.cookie.match(new RegExp('(^| )' + name + '=([^;]+)'));
      return match ? match[2] : null;
    };

    // --- Komponent Wizualizatora Kołowego (Pizza/Tort) ---
    const PieChart = ({ total, filled, size = 260, interactive = false, selectedSlices = [], onSliceClick = () => {} }) => {
      if (total === 0) return null;
      const center = size / 2;
      const radius = size / 2 - 10; 

      const slices = [];
      for (let i = 0; i < total; i++) {
        const startAngle = (i / total) * 360 - 90;
        const endAngle = ((i + 1) / total) * 360 - 90;
        
        const isFilled = interactive ? selectedSlices[i] : i < filled;

        const x1 = center + radius * Math.cos((Math.PI * startAngle) / 180);
        const y1 = center + radius * Math.sin((Math.PI * startAngle) / 180);
        const x2 = center + radius * Math.cos((Math.PI * endAngle) / 180);
        const y2 = center + radius * Math.sin((Math.PI * endAngle) / 180);

        const largeArcFlag = endAngle - startAngle <= 180 ? "0" : "1";

        const d = [
          "M", center, center,
          "L", x1, y1,
          "A", radius, radius, 0, largeArcFlag, 1, x2, y2,
          "Z"
        ].join(" ");

        const interactiveClass = interactive ? "cursor-pointer hover:opacity-80 transition-opacity" : "transition-all duration-300 ease-in-out";

        if (total === 1) {
          slices.push(
            <circle key={i} cx={center} cy={center} r={radius} 
                    fill={isFilled ? "#FCD34D" : "#FFFBEB"} 
                    stroke="#D97706" strokeWidth="4"
                    onClick={() => interactive && onSliceClick(i)}
                    className={interactiveClass} />
          );
        } else {
          slices.push(
            <path key={i} d={d} 
                  fill={isFilled ? "#FCD34D" : "#FFFBEB"} 
                  stroke="#D97706" strokeWidth="3" 
                  onClick={() => interactive && onSliceClick(i)}
                  className={interactiveClass} />
          );
        }
      }

      return (
        <svg width={size} height={size} className="drop-shadow-lg max-w-full h-auto">
          <circle cx={center} cy={center} r={radius} fill="#FFFBEB" stroke="#D97706" strokeWidth="4" />
          {slices}
        </svg>
      );
    };

    // --- Komponent Wizualizatora Prostokątnego (Czekolada) ---
    const BarChart = ({ total, filled, interactive = false, selectedSlices = [], onSliceClick = () => {} }) => {
      return (
        <div className="flex w-full h-32 md:h-40 max-w-md border-4 border-amber-900 rounded-2xl overflow-hidden drop-shadow-md bg-amber-50">
          {Array.from({ length: total }).map((_, i) => {
            const isFilled = interactive ? selectedSlices[i] : i < filled;
            return (
              <div 
                key={i} 
                onClick={() => interactive && onSliceClick(i)}
                className={`flex-1 border-r-4 last:border-r-0 border-amber-900 
                  ${interactive ? 'cursor-pointer hover:bg-amber-200 transition-colors' : 'transition-colors duration-500'}
                  ${isFilled ? 'bg-amber-700' : 'bg-amber-100'}`} 
              />
            );
          })}
        </div>
      );
    };

    // --- Komponent ładnie wyświetlający ułamek ---
    const FractionText = ({ n, d, size = "text-4xl" }) => (
      <div className={`inline-flex flex-col items-center justify-center font-black text-slate-800 ${size} mx-2 align-middle`}>
        <span className="border-b-4 border-slate-800 px-2 leading-none pb-1">{n}</span>
        <span className="px-2 leading-none pt-1">{d}</span>
      </div>
    );

    // --- Słownik Tłumaczeń ---
    const translations = {
      pl: {
        title: "Wesołe Ułamki!",
        explore: "Odkrywaj",
        choose: "Wybierz",
        type: "Wpisz",
        color: "Koloruj",
        easy: "Łatwy",
        medium: "Średni",
        survival: "SURVIVAL!",
        streak: "Seria:",
        build: "Zbuduj swój ułamek!",
        pizza: "Pizza 🍕",
        chocolate: "Czekolada 🍫",
        colorTitle: "Pokoloruj ułamek!",
        target: "Cel:",
        done: "GOTOWE!",
        chooseTitle: "Wybierz poprawny ułamek!",
        typeTitle: "Napisz, co widzisz!",
        check: "SPRAWDŹ!",
        awesome: "WSPANIALE!",
        points: "punktów",
        tryAgain: "SPRÓBUJ PONOWNIE",
        survivalLoss: "SURVIVAL:\nTRACISZ 50 PUNKTÓW!",
        resetTitle: "Zresetować wyniki?",
        resetDesc: "Twoje punkty i seria zostaną wyzerowane. Jesteś pewien?",
        no: "Nie",
        yes: "Tak, usuń",
        footer: "Aplikację zaprojektował",
        numerator: "licznik",
        fractionLine: "kreska ułamkowa",
        denominator: "mianownik",
        hardcore: "HARDCORE!",
        hardcoreLoss: "HARDCORE:\nTRACISZ WSZYSTKO!",
        rulesTitle: "Zasady Gry",
        ruleEasy: "ułamki do 5 części (+5 pkt)",
        ruleMedium: "ułamki do 10 części (+10 pkt)",
        ruleSurvival: "ułamki do 16 części (+15 pkt, błąd = -50 pkt)",
        ruleHardcore: "ułamki do 20 części (+20 pkt, błąd = strata wszystkich punktów!)",
        close: "Zamknij"
      },
      is: {
        title: "Skemmtileg brot!",
        explore: "Skoða",
        choose: "Velja",
        type: "Skrifa",
        color: "Lita",
        easy: "Auðvelt",
        medium: "Miðlungs",
        survival: "SURVIVAL!",
        streak: "Röð:",
        build: "Búðu til þitt brot!",
        pizza: "Pítsa 🍕",
        chocolate: "Súkkulaði 🍫",
        colorTitle: "Litaðu brotið!",
        target: "Markmið:",
        done: "TILBÚIÐ!",
        chooseTitle: "Veldu rétta brotið!",
        typeTitle: "Skrifaðu það sem þú sérð!",
        check: "ATHUGA!",
        awesome: "FRÁBÆRT!",
        points: "stig",
        tryAgain: "REYNDU AFTUR",
        survivalLoss: "SURVIVAL:\nÞÚ TAPAR 50 STIGUM!",
        resetTitle: "Núllstilla stig?",
        resetDesc: "Stigin þín og röðin verða núllstillt. Ertu viss?",
        no: "Nei",
        yes: "Já, eyða",
        footer: "Forritið hannaði",
        numerator: "teljari",
        fractionLine: "brotastrik",
        denominator: "nefnari",
        hardcore: "HARDCORE!",
        hardcoreLoss: "HARDCORE:\nÞÚ TAPAR ÖLLU!",
        rulesTitle: "Leikreglur",
        ruleEasy: "brot allt að 5 hlutar (+5 stig)",
        ruleMedium: "brot allt að 10 hlutar (+10 stig)",
        ruleSurvival: "brot allt að 16 hlutar (+15 stig, villa = -50 stig)",
        ruleHardcore: "brot allt að 20 hlutar (+20 stig, villa = tapar öllu!)",
        close: "Loka"
      },
      en: {
        title: "Fun Fractions!",
        explore: "Explore",
        choose: "Choose",
        type: "Type",
        color: "Color",
        easy: "Easy",
        medium: "Medium",
        survival: "SURVIVAL!",
        streak: "Streak:",
        build: "Build your fraction!",
        pizza: "Pizza 🍕",
        chocolate: "Chocolate 🍫",
        colorTitle: "Color the fraction!",
        target: "Target:",
        done: "DONE!",
        chooseTitle: "Choose correct fraction!",
        typeTitle: "Type what you see!",
        check: "CHECK!",
        awesome: "AWESOME!",
        points: "points",
        tryAgain: "TRY AGAIN",
        survivalLoss: "SURVIVAL:\nYOU LOSE 50 POINTS!",
        resetTitle: "Reset score?",
        resetDesc: "Your score and streak will be reset. Are you sure?",
        no: "No",
        yes: "Yes, delete",
        footer: "App designed by",
        numerator: "numerator",
        fractionLine: "fraction line",
        denominator: "denominator",
        hardcore: "HARDCORE!",
        hardcoreLoss: "HARDCORE:\nYOU LOSE EVERYTHING!",
        rulesTitle: "Game Rules",
        ruleEasy: "fractions up to 5 parts (+5 pts)",
        ruleMedium: "fractions up to 10 parts (+10 pts)",
        ruleSurvival: "fractions up to 16 parts (+15 pts, mistake = -50 pts)",
        ruleHardcore: "fractions up to 20 parts (+20 pts, mistake = lose all pts!)",
        close: "Close"
      }
    };

    const DIFF_SETTINGS = {
      easy: { maxDen: 5, points: 5 },
      medium: { maxDen: 10, points: 10 },
      survival: { maxDen: 16, points: 15 },
      hardcore: { maxDen: 20, points: 20 }
    };

    function App() {
      const [user, setUser] = useState(null);
      const [isLoaded, setIsLoaded] = useState(false);

      const [lang, setLang] = useState('pl');
      const t = translations[lang] || translations['pl'];

      const [tab, setTab] = useState('learn'); 
      const [score, setScore] = useState(0); 
      const [streak, setStreak] = useState(0);
      const [diff, setDiff] = useState('medium'); 
      
      const [showResetConfirm, setShowResetConfirm] = useState(false);
      const [showRules, setShowRules] = useState(false);
      
      const timerRef = useRef(null);

      // Stan dla trybów
      const [ln, setLn] = useState(1); const [ld, setLd] = useState(4); const [vType, setVType] = useState('pie');
      const [quiz, setQuiz] = useState(null); const [typeQ, setTypeQ] = useState(null); const [colQ, setColQ] = useState(null);
      const [tn, setTn] = useState(1); const [td, setTd] = useState(2); const [fb, setFb] = useState(null);
      const [colored, setColored] = useState([]);

      // --- LOGIKA ZAPISU (CHMURA LUB PAMIĘĆ NA GITHUBIE) ---
      useEffect(() => {
        if (!auth) {
          // Użytkownik jest na GitHub Pages - wczytujemy z pamięci przeglądarki!
          const savedScore = getCookie('weso_score');
          const savedStreak = getCookie('weso_streak');
          const savedLang = getCookie('weso_lang');
          const savedDiff = getCookie('weso_diff');

          if (savedScore) setScore(parseInt(savedScore));
          if (savedStreak) setStreak(parseInt(savedStreak));
          if (savedLang) setLang(savedLang);
          if (savedDiff) setDiff(savedDiff);
          
          setIsLoaded(true);
          return;
        }

        // Użytkownik jest w środowisku z bazą - logowanie do chmury
        const initAuth = async () => {
          try {
            if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
              await signInWithCustomToken(auth, __initial_auth_token);
            } else {
              await signInAnonymously(auth);
            }
          } catch (error) {
            console.error("Auth error", error);
            setIsLoaded(true);
          }
        };
        initAuth();
        
        const unsubscribe = onAuthStateChanged(auth, (u) => {
          setUser(u);
          if (!u) setIsLoaded(true);
        });
        return () => unsubscribe();
      }, []);

      useEffect(() => {
        if (!auth || !user) return;
        const progressRef = doc(db, 'artifacts', appId, 'users', user.uid, 'settings', 'progress');
        const unsubscribe = onSnapshot(progressRef, (docSnap) => {
          // Zmiana z docSnap.exists() na docSnap.exists dla kompatybilności z Firebase Compat v8/v9
          if (docSnap.exists) {
            const data = docSnap.data();
            if (data.score !== undefined) setScore(data.score);
            if (data.streak !== undefined) setStreak(data.streak);
            if (data.lang !== undefined) setLang(data.lang);
            if (data.diff !== undefined) setDiff(data.diff);
          }
          setIsLoaded(true);
        }, (error) => {
          console.error("Firestore error", error);
          setIsLoaded(true);
        });
        return () => unsubscribe();
      }, [user]);

      const saveProgress = async (newScore, newStreak, newLang, newDiff) => {
        if (!auth) {
          // Zapis na GitHub Pages do plików cookie
          setCookie('weso_score', newScore);
          setCookie('weso_streak', newStreak);
          setCookie('weso_lang', newLang);
          setCookie('weso_diff', newDiff);
          return;
        }

        if (!user) return;
        const progressRef = doc(db, 'artifacts', appId, 'users', user.uid, 'settings', 'progress');
        try {
          await setDoc(progressRef, {
            score: newScore,
            streak: newStreak,
            lang: newLang,
            diff: newDiff
          }, { merge: true });
        } catch (error) {
          console.error("Zapis nie powiódł się", error);
        }
      };

      // --- FUNKCJE POMOCNICZE Z UAKTUALNIANIEM CHMURY ---
      const handleLangChange = (newLang) => {
        setLang(newLang);
        saveProgress(score, streak, newLang, diff);
      };

      const handleDiffChange = (newDiff) => {
        setDiff(newDiff);
        saveProgress(score, streak, lang, newDiff);
      };

      const confirmReset = () => {
        setScore(0);
        setStreak(0);
        setShowResetConfirm(false);
        saveProgress(0, 0, lang, diff);
      };

      // Generator ułamków zależny od trudności
      const getFraction = () => {
        const maxDen = DIFF_SETTINGS[diff].maxDen;
        const d = Math.floor(Math.random() * (maxDen - 1)) + 2;
        return { n: Math.floor(Math.random() * d) + 1, d, type: Math.random() > 0.5 ? 'pie' : 'bar' };
      };

      const genQuiz = () => {
        const q = getFraction(); 
        const opts = new Set([`${q.n}/${q.d}`]);
        while(opts.size < 4) { 
          const wrong = getFraction();
          if (wrong.n/wrong.d !== q.n/q.d) opts.add(`${wrong.n}/${wrong.d}`); 
        }
        setQuiz({ 
            ...q, 
            opts: Array.from(opts).sort(() => Math.random() - 0.5).map(o => ({n: parseInt(o.split('/')[0]), d: parseInt(o.split('/')[1])})) 
        }); 
        setFb(null);
      };

      const genType = () => { setTypeQ(getFraction()); setTn(1); setTd(2); setFb(null); };
      
      const genCol = () => { 
          const q = getFraction(); 
          setColQ(q); 
          setColored(new Array(q.d).fill(false)); 
          setFb(null); 
      };

      useEffect(() => { 
        if (!isLoaded) return;
        if (timerRef.current) clearTimeout(timerRef.current);
        setFb(null); 
        if(tab==='quiz') genQuiz(); 
        if(tab==='type') genType(); 
        if(tab==='color') genCol(); 
      }, [tab, diff, isLoaded]);

      // Obsługa wygranej i przegranej
      const handleWin = (nextFn) => { 
        if (fb !== null) return;
        const pts = DIFF_SETTINGS[diff].points;
        const newScore = score + pts;
        const newStreak = streak + 1;
        
        setScore(newScore); 
        setStreak(newStreak); 
        setFb('ok'); 
        saveProgress(newScore, newStreak, lang, diff); 
        timerRef.current = setTimeout(nextFn, 1500); 
      };

      const handleLoss = () => { 
        if (fb !== null) return;
        let newScore = score;
        const newStreak = 0;
        
        if (diff === 'survival') {
          newScore = Math.max(0, score - 50); 
        } else if (diff === 'hardcore') {
          newScore = 0;
        }
        
        setScore(newScore);
        setStreak(newStreak); 
        setFb('no'); 
        saveProgress(newScore, newStreak, lang, diff); 
        timerRef.current = setTimeout(() => setFb(null), 1500); 
      };

      // --- EKRAN ŁADOWANIA ---
      if (!isLoaded) {
        return (
          <div className="min-h-screen bg-blue-50 flex flex-col items-center justify-center font-sans">
            <Smile className="text-amber-400 mb-6 animate-bounce" size={80}/>
            <h2 className="text-3xl font-black text-blue-900 animate-pulse">Trwa ładowanie wyników...</h2>
          </div>
        );
      }

      return (
        <div className="min-h-screen bg-blue-50 p-4 flex flex-col items-center font-sans select-none relative overflow-hidden">
          
          {/* NAGŁÓWEK */}
          <header className="w-full max-w-5xl bg-white p-4 rounded-3xl shadow flex flex-col md:flex-row justify-between items-center gap-4 mb-6 border-b-4 border-blue-100">
            <div className="flex items-center gap-2 font-black text-blue-900 text-xl sm:text-2xl">
              <Smile className="text-amber-400" size={32}/> {t.title}
            </div>
            
            <div className="flex flex-wrap items-center justify-center gap-3">
              {/* PRZEŁĄCZNIK JĘZYKÓW */}
              <div className="flex gap-2 bg-slate-100 p-1.5 rounded-full border-2 border-slate-200">
                <button onClick={() => handleLangChange('pl')} className={`w-10 h-10 rounded-full overflow-hidden flex items-center justify-center transition-all ${lang === 'pl' ? 'shadow-md scale-110 ring-2 ring-blue-400' : 'opacity-60 hover:opacity-100 grayscale hover:grayscale-0'}`}>
                  <img src="https://flagcdn.com/pl.svg" alt="Polski" className="w-full h-full object-cover" />
                </button>
                <button onClick={() => handleLangChange('is')} className={`w-10 h-10 rounded-full overflow-hidden flex items-center justify-center transition-all ${lang === 'is' ? 'shadow-md scale-110 ring-2 ring-blue-400' : 'opacity-60 hover:opacity-100 grayscale hover:grayscale-0'}`}>
                  <img src="https://flagcdn.com/is.svg" alt="Íslenska" className="w-full h-full object-cover" />
                </button>
                <button onClick={() => handleLangChange('en')} className={`w-10 h-10 rounded-full overflow-hidden flex items-center justify-center transition-all ${lang === 'en' ? 'shadow-md scale-110 ring-2 ring-blue-400' : 'opacity-60 hover:opacity-100 grayscale hover:grayscale-0'}`}>
                  <img src="https://flagcdn.com/gb.svg" alt="English" className="w-full h-full object-cover" />
                </button>
              </div>

              <div className="bg-yellow-100 px-4 py-2 rounded-full font-bold text-yellow-700 flex items-center gap-2 h-11">
                <Star className="fill-yellow-400" size={20}/> <span className="text-xl">{score}</span>
              </div>
              
              <button 
                onClick={() => setShowRules(true)} 
                className="bg-blue-100 px-4 py-2 rounded-full font-bold text-blue-600 hover:bg-blue-200 transition active:scale-95 flex items-center gap-2 h-11 shadow-sm"
                title={t.rulesTitle}
              >
                <BookOpen size={20} />
                <span className="hidden sm:inline">{t.rulesTitle}</span>
              </button>
              
              <button 
                onClick={() => setShowResetConfirm(true)} 
                className="bg-slate-100 p-3 rounded-full text-slate-500 hover:bg-red-100 hover:text-red-600 transition active:scale-95 h-11 w-11 flex items-center justify-center"
                title={t.resetTitle}
              >
                <RotateCcw size={20} />
              </button>
            </div>
          </header>

          {/* WYBÓR ZAKŁADKI */}
          <div className="flex flex-wrap justify-center gap-2 sm:gap-4 mb-4">
            <button onClick={() => setTab('learn')} className={`px-4 sm:px-6 py-2.5 rounded-full font-bold border-2 transition-all ${tab==='learn'?'bg-blue-500 text-white shadow-lg border-blue-500':'bg-white text-blue-500 border-blue-200 hover:bg-blue-50'}`}><Play size={18} className="inline mr-1 sm:mr-2"/>{t.explore}</button>
            <button onClick={() => setTab('quiz')} className={`px-4 sm:px-6 py-2.5 rounded-full font-bold border-2 transition-all ${tab==='quiz'?'bg-green-500 text-white shadow-lg border-green-500':'bg-white text-green-500 border-green-200 hover:bg-green-50'}`}><Award size={18} className="inline mr-1 sm:mr-2"/>{t.choose}</button>
            <button onClick={() => setTab('type')} className={`px-4 sm:px-6 py-2.5 rounded-full font-bold border-2 transition-all ${tab==='type'?'bg-purple-500 text-white shadow-lg border-purple-500':'bg-white text-purple-500 border-purple-200 hover:bg-purple-50'}`}><Pencil size={18} className="inline mr-1 sm:mr-2"/>{t.type}</button>
            <button onClick={() => setTab('color')} className={`px-4 sm:px-6 py-2.5 rounded-full font-bold border-2 transition-all ${tab==='color'?'bg-orange-500 text-white shadow-lg border-orange-500':'bg-white text-orange-500 border-orange-200 hover:bg-orange-50'}`}><Paintbrush size={18} className="inline mr-1 sm:mr-2"/>{t.color}</button>
          </div>

          {/* WYBÓR TRUDNOŚCI */}
          {tab !== 'learn' && (
            <div className="relative z-30 flex flex-wrap justify-center gap-2 sm:gap-3 mb-8 bg-white/80 p-2 rounded-full border-2 border-slate-200 shadow-sm backdrop-blur-md max-w-2xl mx-auto">
              <button onClick={() => handleDiffChange('easy')} className={`px-5 py-2 rounded-full text-sm font-bold transition-all border-2 ${diff==='easy'?'bg-green-100 border-green-500 text-green-700 shadow-sm scale-105':'bg-white border-transparent text-slate-500 hover:border-green-200 hover:text-green-600'}`}>{t.easy}</button>
              <button onClick={() => handleDiffChange('medium')} className={`px-5 py-2 rounded-full text-sm font-bold transition-all border-2 ${diff==='medium'?'bg-blue-100 border-blue-500 text-blue-700 shadow-sm scale-105':'bg-white border-transparent text-slate-500 hover:border-blue-200 hover:text-blue-600'}`}>{t.medium}</button>
              <button onClick={() => handleDiffChange('survival')} className={`px-5 py-2 rounded-full text-sm font-bold transition-all border-2 flex items-center gap-1 ${diff==='survival'?'bg-red-500 border-red-600 text-white shadow-md scale-105':'bg-white border-transparent text-slate-500 hover:border-red-200 hover:text-red-500'}`}><Flame size={16}/> {t.survival}</button>
              <button onClick={() => handleDiffChange('hardcore')} className={`px-5 py-2 rounded-full text-sm font-black transition-all border-2 flex items-center gap-1 ${diff==='hardcore'?'bg-slate-900 border-black text-red-500 shadow-md scale-105':'bg-white border-transparent text-slate-500 hover:border-slate-300 hover:text-slate-900'}`}>💀 {t.hardcore}</button>
            </div>
          )}

          {/* GŁÓWNY KONTENER */}
          <div className="w-full max-w-5xl relative bg-white p-6 sm:p-10 rounded-[3rem] shadow-2xl border-4 border-white min-h-[450px] flex flex-col justify-center">
            
            {streak >= 3 && tab !== 'learn' && (
                <div className="absolute -top-4 -right-4 sm:-right-2 bg-orange-100 text-orange-600 px-4 py-1.5 rounded-full border-2 border-orange-300 font-black animate-pulse shadow-md flex items-center gap-1 z-20">
                    <Flame size={18}/> {t.streak} {streak}
                </div>
            )}
            
            {/* ZAKŁADKA: ODKRYWAJ */}
            {tab === 'learn' && (
              <div className="w-full grid grid-cols-1 md:grid-cols-2 gap-8 items-center">
                {/* Lewa strona - Obrazek */}
                <div className="flex flex-col items-center">
                  <div className="flex gap-4 mb-8 bg-slate-50 p-2 rounded-2xl border border-slate-200">
                     <button onClick={() => setVType('pie')} className={`px-6 py-2.5 rounded-xl transition-all ${vType==='pie'?'bg-white shadow text-blue-600 font-bold':'text-slate-400 hover:text-slate-600'}`}>{t.pizza}</button>
                     <button onClick={() => setVType('bar')} className={`px-6 py-2.5 rounded-xl transition-all ${vType==='bar'?'bg-white shadow text-amber-700 font-bold':'text-slate-400 hover:text-slate-600'}`}>{t.chocolate}</button>
                  </div>
                  <div className="h-64 flex items-center justify-center w-full">
                      {vType === 'pie' ? <PieChart total={ld} filled={ln} /> : <BarChart total={ld} filled={ln} />}
                  </div>
                </div>
                
                {/* Prawa strona - Sterowanie z Etykietami */}
                <div className="flex flex-col items-center justify-center">
                  <h2 className="text-3xl sm:text-4xl font-black text-slate-800 mb-8 text-center">{t.build}</h2>
                  <div className="bg-blue-50 p-6 sm:p-8 rounded-[2.5rem] border-4 border-blue-100 shadow-inner w-full max-w-md flex flex-col gap-5">
                    
                    <div className="flex items-center gap-4">
                      <div className="flex-1 flex items-center justify-between bg-white rounded-full border-2 border-slate-200 shadow-sm overflow-hidden">
                        <button onClick={() => setLn(Math.max(ln-1, 0))} className="px-5 sm:px-6 py-3 sm:py-4 text-red-500 hover:bg-red-50 active:scale-95 transition"><ChevronDown size={28}/></button>
                        <span className="w-16 text-center font-black text-4xl text-slate-800">{ln}</span>
                        <button onClick={() => setLn(Math.min(ln+1, ld))} className="px-5 sm:px-6 py-3 sm:py-4 text-green-500 hover:bg-green-50 active:scale-95 transition"><ChevronUp size={28}/></button>
                      </div>
                      <span className="w-24 sm:w-32 text-slate-500 font-bold text-sm sm:text-base lowercase leading-tight flex items-center gap-1"><span className="text-slate-400">←</span> {t.numerator}</span>
                    </div>
                    
                    <div className="flex items-center gap-4">
                      <div className="flex-1 h-2.5 bg-slate-800 rounded-full mx-1"></div>
                      <span className="w-24 sm:w-32 text-slate-500 font-bold text-sm sm:text-base lowercase leading-tight flex items-center gap-1"><span className="text-slate-400">←</span> {t.fractionLine}</span>
                    </div>
                    
                    <div className="flex items-center gap-4">
                      <div className="flex-1 flex items-center justify-between bg-white rounded-full border-2 border-slate-200 shadow-sm overflow-hidden">
                        <button onClick={() => {const d=Math.max(ld-1,1); setLd(d); if(ln>d) setLn(d);}} className="px-5 sm:px-6 py-3 sm:py-4 text-red-500 hover:bg-red-50 active:scale-95 transition"><ChevronDown size={28}/></button>
                        <span className="w-16 text-center font-black text-4xl text-slate-800">{ld}</span>
                        <button onClick={() => setLd(Math.min(ld+1, 16))} className="px-5 sm:px-6 py-3 sm:py-4 text-green-500 hover:bg-green-50 active:scale-95 transition"><ChevronUp size={28}/></button>
                      </div>
                      <span className="w-24 sm:w-32 text-slate-500 font-bold text-sm sm:text-base lowercase leading-tight flex items-center gap-1"><span className="text-slate-400">←</span> {t.denominator}</span>
                    </div>

                  </div>
                </div>
              </div>
            )}

            {/* ZAKŁADKA: KOLORUJ */}
            {tab === 'color' && colQ && (
              <div className="w-full grid grid-cols-1 md:grid-cols-2 gap-8 items-center">
                {/* Lewa strona - Obrazek */}
                <div className="flex justify-center items-center h-64 md:h-80 w-full order-2 md:order-1">
                  {colQ.type === 'pie' 
                    ? <PieChart total={colQ.d} interactive selectedSlices={colored} onSliceClick={(i)=>{if(fb!==null)return; const n=[...colored]; n[i]=!n[i]; setColored(n);}} size={260}/> 
                    : <BarChart total={colQ.d} interactive selectedSlices={colored} onSliceClick={(i)=>{if(fb!==null)return; const n=[...colored]; n[i]=!n[i]; setColored(n);}} />
                  }
                </div>

                {/* Prawa strona - Cel i przycisk */}
                <div className="flex flex-col items-center justify-center order-1 md:order-2">
                  <h2 className="text-3xl sm:text-4xl font-black mb-8 text-slate-800 text-center">{t.colorTitle}</h2>
                  <div className="bg-orange-50 px-10 py-6 rounded-3xl border-4 border-orange-100 mb-8 flex flex-col items-center gap-4">
                    <span className="text-xl font-bold text-slate-500 uppercase tracking-wider">{t.target}</span> 
                    <FractionText n={colQ.n} d={colQ.d} size="text-7xl" />
                  </div>
                  
                  <button 
                      onClick={() => {
                          const totalColored = colored.filter(Boolean).length;
                          if (totalColored === colQ.n) handleWin(genCol);
                          else handleLoss();
                      }} 
                      disabled={fb !== null}
                      className="bg-orange-500 hover:bg-orange-600 text-white px-12 py-5 rounded-full font-black text-2xl shadow-xl shadow-orange-200 transition-all active:scale-95 flex items-center gap-3 disabled:opacity-50 disabled:cursor-not-allowed w-full max-w-sm justify-center"
                  >
                      <Check size={32} strokeWidth={3}/> {t.done}
                  </button>
                </div>
              </div>
            )}

            {/* ZAKŁADKA: QUIZ */}
            {tab === 'quiz' && quiz && (
              <div className="w-full grid grid-cols-1 md:grid-cols-2 gap-8 items-center">
                {/* Lewa strona - Obrazek */}
                <div className="h-64 md:h-80 flex items-center justify-center w-full">
                    {quiz.type === 'pie' ? <PieChart total={quiz.d} filled={quiz.n} size={260} /> : <BarChart total={quiz.d} filled={quiz.n}/>}
                </div>

                {/* Prawa strona - Opcje */}
                <div className="flex flex-col items-center w-full">
                  <h2 className="text-3xl sm:text-4xl font-black mb-10 text-slate-800 text-center">{t.chooseTitle}</h2>
                  <div className="grid grid-cols-2 gap-4 sm:gap-6 w-full max-w-sm">
                    {quiz.opts.map((o, i) => (
                        <button 
                          key={i} 
                          onClick={() => { o.n === quiz.n && o.d === quiz.d ? handleWin(genQuiz) : handleLoss(); }} 
                          disabled={fb !== null}
                          className="bg-white border-4 border-slate-100 hover:border-blue-400 hover:bg-blue-50 py-8 rounded-3xl flex justify-center transition-all active:scale-95 shadow-sm disabled:opacity-50 disabled:cursor-not-allowed"
                        >
                          <FractionText n={o.n} d={o.d} size="text-5xl"/>
                        </button>
                    ))}
                  </div>
                </div>
              </div>
            )}

            {/* ZAKŁADKA: WPISZ */}
            {tab === 'type' && typeQ && (
              <div className="w-full grid grid-cols-1 md:grid-cols-2 gap-8 items-center">
                 {/* Lewa strona - Obrazek */}
                 <div className="h-64 md:h-80 flex items-center justify-center w-full">
                      {typeQ.type === 'pie' ? <PieChart total={typeQ.d} filled={typeQ.n} size={260}/> : <BarChart total={typeQ.d} filled={typeQ.n}/>}
                  </div>

                  {/* Prawa strona - Sterowanie z Etykietami */}
                  <div className="flex flex-col items-center">
                    <h2 className="text-3xl sm:text-4xl font-black mb-10 text-slate-800 text-center">{t.typeTitle}</h2>
                    <div className="bg-purple-50 p-6 sm:p-8 rounded-[2.5rem] border-4 border-purple-100 flex flex-col gap-5 mb-8 w-full max-w-md">
                      
                      <div className="flex items-center gap-4">
                        <div className="flex-1 flex items-center justify-between bg-white rounded-full border-2 border-slate-200 shadow-sm overflow-hidden">
                            <button onClick={() => setTn(s => Math.max(s-1, 0))} className="px-5 sm:px-6 py-3 sm:py-4 text-red-500 hover:bg-red-50 transition"><ChevronDown size={28}/></button>
                            <span className="w-16 text-center font-black text-4xl text-slate-800">{tn}</span>
                            <button onClick={() => setTn(s => s+1)} className="px-5 sm:px-6 py-3 sm:py-4 text-green-500 hover:bg-green-50 transition"><ChevronUp size={28}/></button>
                        </div>
                        <span className="w-24 sm:w-32 text-slate-500 font-bold text-sm sm:text-base lowercase leading-tight flex items-center gap-1"><span className="text-slate-400">←</span> {t.numerator}</span>
                      </div>
                      
                      <div className="flex items-center gap-4">
                        <div className="flex-1 h-2.5 bg-slate-800 rounded-full mx-1"></div>
                        <span className="w-24 sm:w-32 text-slate-500 font-bold text-sm sm:text-base lowercase leading-tight flex items-center gap-1"><span className="text-slate-400">←</span> {t.fractionLine}</span>
                      </div>
                      
                      <div className="flex items-center gap-4">
                        <div className="flex-1 flex items-center justify-between bg-white rounded-full border-2 border-slate-200 shadow-sm overflow-hidden">
                            <button onClick={() => setTd(s => Math.max(s-1, 1))} className="px-5 sm:px-6 py-3 sm:py-4 text-red-500 hover:bg-red-50 transition"><ChevronDown size={28}/></button>
                            <span className="w-16 text-center font-black text-4xl text-slate-800">{td}</span>
                            <button onClick={() => setTd(s => s+1)} className="px-5 sm:px-6 py-3 sm:py-4 text-green-500 hover:bg-green-50 transition"><ChevronUp size={28}/></button>
                        </div>
                        <span className="w-24 sm:w-32 text-slate-500 font-bold text-sm sm:text-base lowercase leading-tight flex items-center gap-1"><span className="text-slate-400">←</span> {t.denominator}</span>
                      </div>

                    </div>
                    
                    <button 
                        onClick={() => { tn === typeQ.n && td === typeQ.d ? handleWin(genType) : handleLoss(); }} 
                        disabled={fb !== null}
                        className="bg-purple-500 hover:bg-purple-600 text-white px-12 py-5 rounded-full font-black text-xl sm:text-2xl shadow-xl shadow-purple-200 active:scale-95 transition-all disabled:opacity-50 disabled:cursor-not-allowed flex items-center justify-center gap-3 w-full max-w-sm"
                    >
                        <Check size={32} strokeWidth={3}/> {t.check}
                    </button>
                  </div>
              </div>
            )}

            {/* FEEDBACK OVERLAY (Zwycięstwo / Porażka) */}
            {fb && (
              <div className="absolute inset-0 bg-white/95 rounded-[3rem] flex flex-col items-center justify-center z-40 animate-in fade-in zoom-in-95 duration-200">
                {fb === 'ok' ? (
                    <>
                        <CheckCircle2 size={120} className="text-green-500 mb-4 animate-bounce"/>
                        <h3 className="text-4xl sm:text-6xl font-black text-green-600 tracking-tight">{t.awesome}</h3>
                        <p className="font-bold text-green-700 text-2xl sm:text-3xl mt-4 bg-green-100 px-8 py-3 rounded-full">+{DIFF_SETTINGS[diff].points} {t.points}</p>
                    </>
                ) : (
                    <>
                        <XCircle size={120} className="text-red-500 mb-4"/>
                        <h3 className="text-3xl sm:text-5xl font-black text-red-600 text-center tracking-tight">{t.tryAgain}</h3>
                        {diff === 'survival' && (
                            <div className="mt-8 flex flex-col items-center animate-pulse">
                                <Flame size={56} className="text-orange-500 mb-2" />
                                <p className="font-black text-red-700 text-2xl sm:text-3xl bg-red-100 px-8 py-4 rounded-2xl text-center border-2 border-red-200 whitespace-pre-line">
                                    {t.survivalLoss}
                                </p>
                            </div>
                        )}
                        {diff === 'hardcore' && (
                            <div className="mt-8 flex flex-col items-center animate-pulse">
                                <span className="text-6xl mb-2">💀</span>
                                <p className="font-black text-red-100 text-2xl sm:text-3xl bg-slate-900 px-8 py-4 rounded-2xl text-center border-2 border-slate-700 whitespace-pre-line">
                                    {t.hardcoreLoss}
                                </p>
                            </div>
                        )}
                    </>
                )}
              </div>
            )}

            {/* POTWIERDZENIE RESETU WYNIKÓW */}
            {showResetConfirm && (
                <div className="absolute inset-0 bg-slate-900/40 backdrop-blur-sm rounded-[3rem] flex flex-col items-center justify-center z-50 animate-in fade-in duration-200 p-6">
                    <div className="bg-white p-8 rounded-3xl shadow-2xl flex flex-col items-center text-center max-w-md w-full border-4 border-blue-100">
                        <RotateCcw size={64} className="text-blue-500 mb-4"/>
                        <h3 className="text-3xl font-black text-slate-800 mb-2">{t.resetTitle}</h3>
                        <p className="text-slate-500 font-medium mb-8 text-lg">{t.resetDesc}</p>
                        <div className="flex gap-4 w-full">
                            <button 
                                onClick={() => setShowResetConfirm(false)} 
                                className="flex-1 px-6 py-4 bg-slate-100 hover:bg-slate-200 text-slate-700 rounded-2xl font-bold text-xl transition active:scale-95"
                            >
                                {t.no}
                            </button>
                            <button 
                                onClick={confirmReset} 
                                className="flex-1 px-6 py-4 bg-red-500 hover:bg-red-600 text-white rounded-2xl font-bold text-xl transition active:scale-95 shadow-lg shadow-red-200"
                            >
                                {t.yes}
                            </button>
                        </div>
                    </div>
                </div>
            )}

            {/* MODAL: ZASADY GRY (LEGENDA) */}
            {showRules && (
                <div className="absolute inset-0 bg-slate-900/40 backdrop-blur-sm rounded-[3rem] flex flex-col items-center justify-center z-50 animate-in fade-in duration-200 p-4 sm:p-6">
                    <div className="bg-white p-6 sm:p-8 rounded-3xl shadow-2xl flex flex-col items-center max-w-md w-full border-4 border-blue-100">
                        <BookOpen size={48} className="text-blue-500 mb-4"/>
                        <h3 className="text-2xl sm:text-3xl font-black text-slate-800 mb-6 text-center">{t.rulesTitle}</h3>
                        
                        <div className="flex flex-col gap-3 w-full mb-8">
                            <div className="bg-green-50 p-3 sm:p-4 rounded-2xl border border-green-200">
                                <strong className="text-green-700 block text-lg">{t.easy}</strong>
                                <span className="text-slate-600 font-medium">{t.ruleEasy}</span>
                            </div>
                            <div className="bg-blue-50 p-3 sm:p-4 rounded-2xl border border-blue-200">
                                <strong className="text-blue-700 block text-lg">{t.medium}</strong>
                                <span className="text-slate-600 font-medium">{t.ruleMedium}</span>
                            </div>
                            <div className="bg-orange-50 p-3 sm:p-4 rounded-2xl border border-orange-200">
                                <strong className="text-orange-600 block text-lg flex items-center gap-1"><Flame size={18}/> {t.survival}</strong>
                                <span className="text-slate-600 font-medium">{t.ruleSurvival}</span>
                            </div>
                            <div className="bg-slate-100 p-3 sm:p-4 rounded-2xl border border-slate-300">
                                <strong className="text-slate-800 block text-lg flex items-center gap-1">💀 {t.hardcore}</strong>
                                <span className="text-slate-600 font-medium">{t.ruleHardcore}</span>
                            </div>
                        </div>

                        <button 
                            onClick={() => setShowRules(false)} 
                            className="w-full px-6 py-4 bg-blue-500 hover:bg-blue-600 text-white rounded-2xl font-bold text-xl transition active:scale-95 shadow-lg shadow-blue-200"
                        >
                            {t.close}
                        </button>
                    </div>
                </div>
            )}
          </div>

          <footer className="mt-8 mb-4 text-center w-full">
            <p className="text-slate-400 font-medium text-sm">
              {t.footer} <span className="text-slate-500 font-bold uppercase tracking-wider">Mirosław Miras</span>
            </p>
          </footer>

        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
